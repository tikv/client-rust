syntax = "proto3";
package keyspacepb;

import "apipb.proto";
import "gogoproto/gogo.proto";
import "pdpb.proto";
import "rustproto.proto";

option java_package = "org.tikv.kvproto";
option (gogoproto.goproto_sizecache_all) = false;
option (gogoproto.goproto_unkeyed_all) = false;
option (gogoproto.goproto_unrecognized_all) = false;
option (gogoproto.marshaler_all) = true;
option (gogoproto.sizer_all) = true;
option (gogoproto.unmarshaler_all) = true;
option (rustproto.lite_runtime_all) = true;

// Keyspace provides services to manage keyspaces.
service Keyspace {
  rpc LoadKeyspace(LoadKeyspaceRequest) returns (LoadKeyspaceResponse) {}
  rpc LookupKeyspace(LookupKeyspaceRequest) returns (LookupKeyspaceResponse) {}
  rpc AllocateNamespace(AllocateNamespaceRequest) returns (AllocateNamespaceResponse) {}
  // WatchKeyspaces first return all current keyspaces' metadata as its first response.
  // Then, it returns responses containing keyspaces that had their metadata changed.
  rpc WatchKeyspaces(WatchKeyspacesRequest) returns (stream WatchKeyspacesResponse) {}
  rpc UpdateKeyspaceState(UpdateKeyspaceStateRequest) returns (UpdateKeyspaceStateResponse) {}
  rpc GetAllKeyspaces(GetAllKeyspacesRequest) returns (GetAllKeyspacesResponse) {}
}

message KeyspaceMeta {
  oneof keyspace {
    // V1/V2 compatibility keyspace id. V3 should read keyspace_identity instead.
    uint32 id = 1;
    // Canonical V3 keyspace identity.
    apipb.KeyspaceIdentity keyspace_identity = 8;
  }
  string name = 2;
  KeyspaceState state = 3;
  int64 created_at = 4;
  int64 state_changed_at = 5;
  map<string, string> config = 7;
}

enum KeyspaceState {
  ENABLED = 0;
  DISABLED = 1;
  ARCHIVED = 2;
  TOMBSTONE = 3;
}

message LoadKeyspaceRequest {
  pdpb.RequestHeader header = 1;
  string name = 2;
  // Optional namespace for namespace-scoped name lookup in V3.
  // If unset, V3 name-only lookup should use LookupKeyspace and may return multiple keyspaces.
  uint32 namespace_id = 3;
}

message LoadKeyspaceResponse {
  pdpb.ResponseHeader header = 1;
  KeyspaceMeta keyspace = 2;
}

message LookupKeyspaceRequest {
  pdpb.RequestHeader header = 1;
  string name = 2;
}

message LookupKeyspaceResponse {
  pdpb.ResponseHeader header = 1;
  repeated KeyspaceMeta keyspaces = 2;
}

message AllocateNamespaceRequest {
  pdpb.RequestHeader header = 1;
}

message AllocateNamespaceResponse {
  pdpb.ResponseHeader header = 1;
  uint32 namespace_id = 2;
}

message WatchKeyspacesRequest {
  pdpb.RequestHeader header = 1;
}

message WatchKeyspacesResponse {
  pdpb.ResponseHeader header = 1;
  repeated KeyspaceMeta keyspaces = 2;
}

message UpdateKeyspaceStateRequest {
  pdpb.RequestHeader header = 1;
  oneof keyspace {
    // V1/V2 compatibility keyspace id. V3 should use keyspace_identity.
    uint32 id = 2;
    // V3 keyspace identity.
    apipb.KeyspaceIdentity keyspace_identity = 4;
  }
  KeyspaceState state = 3;
}

message UpdateKeyspaceStateResponse {
  pdpb.ResponseHeader header = 1;
  KeyspaceMeta keyspace = 2;
}

message GetAllKeyspacesRequest {
  pdpb.RequestHeader header = 1;
  oneof start_keyspace {
    // V1/V2 compatibility pagination cursor. V3 should use namespace_id and start_keyspace_identity.
    uint32 start_id = 2;
    // V3 pagination cursor within namespace_id.
    apipb.KeyspaceIdentity start_keyspace_identity = 5;
  }
  uint32 limit = 3;
  // V3 namespace-limited pagination. Must be non-zero in V3.
  uint32 namespace_id = 4;
}

message GetAllKeyspacesResponse {
  pdpb.ResponseHeader header = 1;
  repeated KeyspaceMeta keyspaces = 2;
}
